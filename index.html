<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiara's AI Weekly · 归档目录</title>
<meta name="description" content="Kiara 的 AI 行业周报归档。每周从北美 AI 行业筛选一手信源、结构化分析。">
<link rel="stylesheet" href="assets/style.css">
<style>
  /* 首页专用：目录风格，行内极简 */
  .site-nav {
    display: flex;
    gap: 20px;
    justify-content: flex-end;
    padding: 8px 0 24px;
    font-size: var(--fs-small);
  }
  .site-nav a {
    color: var(--text-soft);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .site-nav a:hover {
    color: var(--green);
    border-bottom-color: var(--green);
  }

  /* 目录标题区 */
  .archive-header {
    margin: 24px 0 8px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .archive-header-label {
    color: var(--text-faint);
    font-size: var(--fs-small);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .archive-header-count {
    color: var(--text-faint);
    font-size: var(--fs-small);
    float: right;
  }

  /* 目录列表：一行 = 日期 + 期次 + 摘要 */
  .toc-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .toc-list li {
    padding: 20px 0;
    border-bottom: 1px solid var(--line);
  }
  .toc-list li:last-child { border-bottom: none; }
  .toc-link {
    display: block;
    color: var(--text);
    text-decoration: none;
    border-bottom: none;
  }
  .toc-meta {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 6px;
    font-size: var(--fs-small);
    color: var(--text-faint);
  }
  .toc-meta .toc-week {
    color: var(--green);
    font-weight: 700;
    letter-spacing: 1px;
  }
  .toc-meta .toc-date {
    font-variant-numeric: tabular-nums;
  }
  .toc-summary {
    color: var(--text-soft);
    font-size: 15px;
    line-height: 1.75;
    transition: color 0.15s;
  }
  .toc-link:hover .toc-summary {
    color: var(--text);
  }
  .toc-link:hover .toc-week {
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .toc-empty {
    color: var(--text-faint);
    font-size: var(--fs-small);
    padding: 24px 0;
    text-align: center;
  }
  @media (max-width: 640px) {
    .toc-meta { flex-wrap: wrap; gap: 8px; }
    .archive-header-count { float: none; display: block; margin-top: 4px; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- 顶部导航 -->
  <nav class="site-nav">
    <a href="about.html">关于</a>
    <a href="https://github.com/kiarazhang-spec/kiara-weekly-ai" target="_blank" rel="noopener">GitHub</a>
  </nav>

  <!-- 报头 -->
  <header class="masthead">
    <div class="masthead-kicker">AI WEEKLY · NORTH AMERICA</div>
    <h1 class="masthead-title">Kiara's AI Weekly</h1>
    <div class="masthead-meta">
      每周从 <strong>200+ 条北美 AI 行业资讯</strong> 中，按 <strong>S/A/B 三级信源</strong>分层筛选，每篇附<strong>「产品技术视角」</strong>与<strong>「趋势研判」</strong>。太平洋时间每周一更新。
    </div>
  </header>

  <!-- 归档目录 -->
  <div class="archive-header">
    <span class="archive-header-label">归档目录 · Archive</span>
    <span class="archive-header-count" id="toc-count"></span>
  </div>
  <ul class="toc-list" id="toc-list">
    <li class="toc-empty">加载中...</li>
  </ul>

  <footer class="footer">
    Kiara's AI Weekly · <a href="about.html" style="color:inherit;">关于本简报</a> · <a href="https://github.com/kiarazhang-spec/kiara-weekly-ai" target="_blank" rel="noopener" style="color:inherit;">GitHub</a>
  </footer>

</div>

<script>
/**
 * 目录首页：读 manifest.json，按 date_start 倒序渲染成极简一行式列表
 * 一行 = 期次 · 日期区间 · 一句话摘要
 */
(async function () {
  const tocEl = document.getElementById('toc-list');
  const countEl = document.getElementById('toc-count');

  try {
    const res = await fetch('posts/manifest.json?t=' + Date.now());
    if (!res.ok) throw new Error('manifest fetch failed: ' + res.status);
    const data = await res.json();

    let posts = (data.posts || []).slice();
    if (posts.length === 0) {
      tocEl.innerHTML = '<li class="toc-empty">还没有任何一期，请稍后回来。</li>';
      return;
    }

    // 按 date_start 倒序（最新在前）
    posts.sort((a, b) => {
      const da = String(a.date_start || a.slug || '');
      const db = String(b.date_start || b.slug || '');
      return db.localeCompare(da);
    });

    if (countEl) countEl.textContent = `共 ${posts.length} 期`;

    tocEl.innerHTML = posts.map(renderRow).join('');
  } catch (err) {
    tocEl.innerHTML = '<li class="toc-empty">加载失败：' + escapeHtml(err.message) + '</li>';
    console.error(err);
  }

  function renderRow(p) {
    // 剥掉 summary 里可能自带的"本期核心："等前缀，保持一行流畅
    const cleanSummary = String(p.summary || '').trim()
      .replace(/^(本期核心|本周一句话总览|本周总览|一句话总览|总览|本期一句话|本期摘要)\s*[:：]\s*/, '');
    const summaryHtml = cleanSummary
      ? `<div class="toc-summary">${escapeHtml(cleanSummary)}</div>`
      : `<div class="toc-summary" style="color:var(--text-faint);">本期摘要待更新</div>`;

    return `
      <li>
        <a class="toc-link" href="${escapeAttr(p.file)}">
          <div class="toc-meta">
            <span class="toc-week">${escapeHtml(p.period_label || p.slug)}</span>
            <span class="toc-date">${escapeHtml(p.date_start)} — ${escapeHtml(p.date_end)}</span>
          </div>
          ${summaryHtml}
        </a>
      </li>
    `;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  function escapeAttr(s) {
    return escapeHtml(s);
  }
})();
</script>

</body>
</html>
